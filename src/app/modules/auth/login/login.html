<app-auth-header titulo="Login"></app-auth-header>

<div class="auth-container">
  <img src="/assets/logo/CECYTEM.png" alt="Logo CECyTEM" class="logo" />

  <h2>¡Bienvenido!</h2>

  <form>
    <label for="email">Correo institucional</label>
    <input
      id="email"
      type="email"
      placeholder="Ingresa tu correo"
      [(ngModel)]="email"
      name="email"
    />

    <label for="password">Contraseña</label>
    <input
      id="password"
      type="password"
      placeholder="Ingresa tu contraseña"
      [(ngModel)]="password"
      name="password"
    />

    <button type="button" (click)="onLogin()">Iniciar sesión</button>
  </form>
</div>
